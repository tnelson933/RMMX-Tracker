openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rocky Mountain Race Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clubs
    description: Club management
  - name: events
    description: Event management
  - name: riders
    description: Rider management
  - name: registrations
    description: Race registrations
  - name: checkins
    description: Race day check-in
  - name: rfid
    description: RFID transponder management
  - name: motos
    description: Race day moto and heat management
  - name: results
    description: Race results and lap times
  - name: series
    description: Series points and leaderboards
  - name: reports
    description: Reports and exports
  - name: dashboard
    description: Dashboard summary data
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: offline
    description: Offline mode package management
  - name: discounts
    description: Discount codes and categories

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /offline/package-info:
    get:
      operationId: getOfflinePackageInfo
      tags: [offline]
      summary: Get offline package build metadata
      description: Returns the build timestamp and version of the current offline server package. Requires authentication.
      responses:
        "200":
          description: Package metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflinePackageInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Offline package not yet built
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /offline/package-rebuild:
    post:
      operationId: rebuildOfflinePackage
      tags: [offline]
      summary: Rebuild the offline server package
      description: Triggers a fresh build of the local server package. Requires authentication. Returns the new build metadata on success.
      responses:
        "200":
          description: Rebuild succeeded — returns new package metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflinePackageInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Rebuild failed or already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user's own profile (name)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMe"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /auth/request-setup:
    post:
      operationId: requestAccountSetup
      tags: [auth]
      summary: Send account setup or password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /auth/complete-setup:
    post:
      operationId: completeAccountSetup
      tags: [auth]
      summary: Activate account and set password using a setup token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSetupInput"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid or expired token

  /auth/complete-tour:
    post:
      operationId: completeTour
      tags: [auth]
      summary: Mark the first-login product tour as completed for the current user
      responses:
        "200":
          description: Tour marked complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all organizer users (super_admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizerUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new organizer user (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizerUser"
        "409":
          description: Email already exists

  /users/{userId}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (super_admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /users/{userId}/resend-invite:
    post:
      operationId: resendUserInvite
      tags: [users]
      summary: Resend setup email to a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent

  # CLUBS
  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List all clubs
      responses:
        "200":
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      operationId: createClub
      tags: [clubs]
      summary: Create a club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubInput"
      responses:
        "201":
          description: Club created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"

  /clubs/gate-settings:
    get:
      operationId: getGateSettings
      tags: [clubs]
      summary: Get gate count and seeding order for the logged-in organizer's club
      responses:
        "200":
          description: Gate settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateSettings"
    patch:
      operationId: updateGateSettings
      tags: [clubs]
      summary: Save gate count and seeding order for the logged-in organizer's club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateSettings"
      responses:
        "200":
          description: Updated gate settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateSettings"

  /clubs/{clubId}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    patch:
      operationId: updateClub
      tags: [clubs]
      summary: Update a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubUpdate"
      responses:
        "200":
          description: Club updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    delete:
      operationId: deleteClub
      tags: [clubs]
      summary: Delete a club (super_admin only)
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Club deleted

  # EVENTS
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (public, filterable by state/club/status)
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: clubId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a race event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted

  # RIDERS
  /riders:
    get:
      operationId: listRiders
      tags: [riders]
      summary: List riders
      parameters:
        - name: clubId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rider"
    post:
      operationId: createRider
      tags: [riders]
      summary: Create a rider record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderInput"
      responses:
        "201":
          description: Rider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/{riderId}:
    get:
      operationId: getRider
      tags: [riders]
      summary: Get rider details with history
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDetail"
    patch:
      operationId: updateRider
      tags: [riders]
      summary: Update rider
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderUpdate"
      responses:
        "200":
          description: Rider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  # RIDER DISCOUNT CODES
  /clubs/{clubId}/riders/{riderId}/discount-code:
    get:
      operationId: getRiderDiscountCode
      tags: [riders]
      summary: Get the current discount code assigned to a rider
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider discount code (or null if none assigned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDiscountCode"
        "401":
          description: Not authenticated
    post:
      operationId: generateRiderDiscountCode
      tags: [riders]
      summary: Generate a rider-specific discount code
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRiderDiscountCodeInput"
      responses:
        "201":
          description: Code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDiscountCode"
        "401":
          description: Not authenticated
        "409":
          description: Rider already has an active discount code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteRiderDiscountCode
      tags: [riders]
      summary: Delete/revoke the rider's current discount code
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated
        "404":
          description: No discount code found for this rider

  # REGISTRATIONS
  /events/{eventId}/registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List registrations for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registrations for event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register a rider for an event (public)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /registrations/{registrationId}:
    patch:
      operationId: updateRegistration
      tags: [registrations]
      summary: Update or void a registration
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationUpdate"
      responses:
        "200":
          description: Registration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  # CHECK-IN
  /events/{eventId}/checkins:
    get:
      operationId: listCheckins
      tags: [checkins]
      summary: List check-in status for all registered riders
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checkin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Checkin"
    post:
      operationId: checkinRider
      tags: [checkins]
      summary: Check in a rider
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinInput"
      responses:
        "200":
          description: Rider checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkin"

  # RFID
  /rfid:
    get:
      operationId: listRfidTags
      tags: [rfid]
      summary: List RFID transponder assignments
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: RFID assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RfidAssignment"
    post:
      operationId: assignRfid
      tags: [rfid]
      summary: Assign RFID transponder to a rider for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RfidAssignmentInput"
      responses:
        "201":
          description: RFID assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfidAssignment"

  # MOTOS / HEATS
  /events/{eventId}/motos:
    get:
      operationId: listMotos
      tags: [motos]
      summary: List motos/heats for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Motos and heats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moto"
    post:
      operationId: createMoto
      tags: [motos]
      summary: Create a moto/heat
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MotoInput"
      responses:
        "201":
          description: Moto created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moto"

  /motos/{motoId}:
    patch:
      operationId: updateMoto
      tags: [motos]
      summary: Update moto status or lineup
      parameters:
        - name: motoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MotoUpdate"
      responses:
        "200":
          description: Moto updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moto"
    delete:
      operationId: deleteMoto
      tags: [motos]
      summary: Delete a moto/heat
      parameters:
        - name: motoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Moto deleted

  /events/{eventId}/motos/reorder:
    post:
      operationId: reorderMotos
      tags: [motos]
      summary: Reorder motos by updating their motoNumber values in bulk
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MotoReorderInput"
      responses:
        "200":
          description: Motos reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moto"

  /events/{eventId}/generate-lineups:
    post:
      operationId: generateLineups
      tags: [motos]
      summary: Auto-generate heat lineups from checked-in riders
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineupGenerateInput"
      responses:
        "200":
          description: Lineups generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moto"

  /events/{eventId}/motos/{motoId}/generate-lineup:
    post:
      operationId: generateMotoLineup
      tags: [motos]
      summary: Regenerate the lineup for a single moto
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: motoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateMotoLineupInput"
      responses:
        "200":
          description: Lineup updated, returns the updated moto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moto"
        "400":
          description: No checked-in riders or moto has no race class
        "404":
          description: Moto not found
        "409":
          description: Moto is completed — lineup is locked

  /events/{eventId}/generate-practice-sessions:
    post:
      operationId: generatePracticeSessions
      tags: [motos]
      summary: Auto-assign checked-in riders to scheduled practice sessions
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePracticeSessionsInput"
      responses:
        "201":
          description: Practice sessions created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moto"

  # RESULTS
  /events/{eventId}/results:
    get:
      operationId: listResults
      tags: [results]
      summary: Get race results for an event (public)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Race results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaceResult"
    post:
      operationId: submitResults
      tags: [results]
      summary: Submit race results for a moto
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultsInput"
      responses:
        "201":
          description: Results submitted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaceResult"

  /events/{eventId}/results/{resultId}/laps:
    patch:
      operationId: updateResultLaps
      tags: [results]
      summary: Update lap times for a single race result
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: resultId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResultLapsInput"
      responses:
        "200":
          description: Lap times updated
          content:
            application/json:
              schema:
