      type: object
      properties:
        status:
          type: string
        lineup:
          type: array
          items:
            type: integer
        scheduledTime:
          type: string
        lapCount:
          type: ["integer", "null"]
        timeLimitMs:
          type: ["integer", "null"]
        plusLaps:
          type: ["integer", "null"]
          description: Extra laps after the time limit expires; null to clear
        timeExpiredAt:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp; set when the race timer expires; pass null to clear
        practiceMode:
          type: ["string", "null"]
          enum: [lap_count, countdown, null]
        countdownSeconds:
          type: ["integer", "null"]
        motoNumber:
          type: integer
