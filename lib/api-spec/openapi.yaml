          type: array
          items:
            type: integer
          minItems: 2
          description: Ordered list of moto IDs — first element starts first, last starts last

    MotoReorderInput:
      type: object
      required: [motoIds]
      properties:
        motoIds:
          type: array
          items:
            type: integer
          description: Ordered array of moto IDs; index+1 becomes the new motoNumber

    LineupEntry:
      type: object
      required: [position, riderId, riderName]
      properties:
        position:
          type: integer
        riderId:
          type: integer
        riderName:
          type: string
        bibNumber:
          type: ["string", "null"]
        rfidNumber:
          type: ["string", "null"]

    LineupGenerateInput:
      type: object
      required: [raceFormat, classes]
      properties:
        raceFormat:
          type: string
          enum: [one_moto, two_moto, three_moto]
        classes:
          type: array
          items:
            type: string
        ridersPerHeat:
          type: integer
        usePracticeSeeding:
          type: boolean
          description: "Deprecated: use gateSeedingMethod instead. Still accepted for backward compatibility."
        gateSeedingMethod:
          type: string
          enum: [random, practice_fastest_lap, previous_round]
          description: >
            Controls how riders are ordered into gate positions.
            random = shuffle randomly (default);
            practice_fastest_lap = sort by best practice lap time (fastest gets best pick);
            previous_round = sort by finish position in the most recently completed round,
            tiebroken by fastest lap time in that round.
            When omitted, defaults to random (preserving backward compatibility).
        rounds:
          type: array
          items:
            type: integer
          description: >
            If provided, only generate motos for these round numbers (1-indexed).
            Omit or leave empty to regenerate all rounds.
            Motos from unspecified rounds are left untouched.
        gatePickMethod:
          type: string
          enum: [random, practice, prior_round_finish, first_registered]
          description: >
            Controls gate number assignment.
            random = riders shuffled randomly, gates assigned in configured priority order;
            practice = sort by best practice lap time (fastest gets first gate pick);
            prior_round_finish = sort by prior round finish position, best finisher picks first;
            first_registered = sort by registration timestamp, earliest registered gets first gate pick.
            Supersedes gateSeedingMethod when both are present.
        timeLimitMs:
          type: integer
          description: >
            Race time limit in milliseconds. When set, the race runs until this
            duration expires, then plusLaps additional laps are counted before
            the moto ends. Mutually exclusive with lapCount (time-based vs
            laps-based).
        plusLaps:
          type: integer
          description: >
            Number of additional laps riders complete after the time limit
            expires. Defaults to 1 (classic "time + 1 lap" motocross format).
            Only meaningful when timeLimitMs is also set.
        lapCount:
          type: integer
          description: >
            Number of laps for each generated moto. When set, indicates this is a
            laps-based race (first to reach this many laps wins) and the value is
            stored on every created moto for display and timing purposes.
        minRacesBetween:
          type: integer
          minimum: 1
          maximum: 3
          description: >
            Minimum number of races that must separate a rider's consecutive motos
            when they are entered in multiple classes. The scheduler will try to
            reorder classes in the run order to satisfy this constraint. If it
            cannot fully satisfy the constraint, motos are still created and the
            remaining conflicts are surfaced in the response header.
        useRegistrations:
          type: boolean
          description: >
            When true, generate lineup slots for all registered riders (not only
            those who have checked in). Riders who have not yet checked in appear
            in the lineup with checkedIn: false. When a rider later checks in,
            their slot is automatically updated to checkedIn: true.

    GenerateMotoLineupInput:
      type: object
      properties:
        gatePickMethod:
          type: string
          enum: [random, practice, prior_round_finish, first_registered]
          description: >
            Gate pick method for this specific moto.
            random = random gate draw;
            practice = by practice lap time;
            prior_round_finish = by prior round finish position;
            first_registered = earliest registered rider gets first gate pick.

