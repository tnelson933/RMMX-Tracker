openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rocky Mountain Race Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clubs
    description: Club management
  - name: events
    description: Event management
  - name: riders
    description: Rider management
  - name: registrations
    description: Race registrations
  - name: checkins
    description: Race day check-in
  - name: rfid
    description: RFID transponder management
  - name: motos
    description: Race day moto and heat management
  - name: results
    description: Race results and lap times
  - name: series
    description: Series points and leaderboards
  - name: reports
    description: Reports and exports
  - name: dashboard
    description: Dashboard summary data
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /auth/request-setup:
    post:
      operationId: requestAccountSetup
      tags: [auth]
      summary: Send account setup or password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /auth/complete-setup:
    post:
      operationId: completeAccountSetup
      tags: [auth]
      summary: Activate account and set password using a setup token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSetupInput"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid or expired token

  /auth/complete-tour:
    post:
      operationId: completeTour
      tags: [auth]
      summary: Mark the first-login product tour as completed for the current user
      responses:
        "200":
          description: Tour marked complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all organizer users (super_admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizerUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new organizer user (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizerUser"
        "409":
          description: Email already exists

  /users/{userId}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (super_admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /users/{userId}/resend-invite:
    post:
      operationId: resendUserInvite
      tags: [users]
      summary: Resend setup email to a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent

  # CLUBS
  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List all clubs
      responses:
        "200":
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      operationId: createClub
      tags: [clubs]
      summary: Create a club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubInput"
      responses:
        "201":
          description: Club created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"

  /clubs/{clubId}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    patch:
      operationId: updateClub
      tags: [clubs]
      summary: Update a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubUpdate"
      responses:
        "200":
          description: Club updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    delete:
      operationId: deleteClub
      tags: [clubs]
      summary: Delete a club (super_admin only)
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Club deleted

  # EVENTS
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (public, filterable by state/club/status)
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: clubId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a race event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted

  # RIDERS
  /riders:
    get:
      operationId: listRiders
      tags: [riders]
      summary: List riders
      parameters:
        - name: clubId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rider"
    post:
      operationId: createRider
      tags: [riders]
      summary: Create a rider record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderInput"
      responses:
        "201":
          description: Rider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/{riderId}:
    get:
      operationId: getRider
      tags: [riders]
      summary: Get rider details with history
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDetail"
    patch:
      operationId: updateRider
      tags: [riders]
      summary: Update rider
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderUpdate"
      responses:
        "200":
          description: Rider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  # REGISTRATIONS
  /events/{eventId}/registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List registrations for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registrations for event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register a rider for an event (public)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /registrations/{registrationId}:
    patch:
      operationId: updateRegistration
      tags: [registrations]
      summary: Update or void a registration
      parameters:
        - name: registrationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationUpdate"
      responses:
        "200":
          description: Registration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  # CHECK-IN
  /events/{eventId}/checkins:
    get:
      operationId: listCheckins
      tags: [checkins]
      summary: List check-in status for all registered riders
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checkin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Checkin"
    post:
      operationId: checkinRider
      tags: [checkins]
      summary: Check in a rider
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinInput"
      responses:
        "200":
          description: Rider checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkin"

  # RFID
  /rfid:
    get:
      operationId: listRfidTags
      tags: [rfid]
      summary: List RFID transponder assignments
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: RFID assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RfidAssignment"
    post:
      operationId: assignRfid
      tags: [rfid]
      summary: Assign RFID transponder to a rider for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RfidAssignmentInput"
      responses:
        "201":
          description: RFID assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfidAssignment"

  # MOTOS / HEATS
  /events/{eventId}/motos:
    get:
      operationId: listMotos
      tags: [motos]
      summary: List motos/heats for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Motos and heats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moto"
    post:
      operationId: createMoto
      tags: [motos]
      summary: Create a moto/heat
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MotoInput"
      responses:
        "201":
          description: Moto created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moto"

  /motos/{motoId}:
    patch:
      operationId: updateMoto
      tags: [motos]
      summary: Update moto status or lineup
      parameters:
        - name: motoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MotoUpdate"
      responses:
        "200":
          description: Moto updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Moto"
    delete:
      operationId: deleteMoto
      tags: [motos]
      summary: Delete a moto/heat
      parameters:
        - name: motoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Moto deleted

  /events/{eventId}/generate-lineups:
    post:
      operationId: generateLineups
      tags: [motos]
      summary: Auto-generate heat lineups from checked-in riders
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineupGenerateInput"
      responses:
        "200":
          description: Lineups generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Moto"

  # RESULTS
  /events/{eventId}/results:
    get:
      operationId: listResults
      tags: [results]
      summary: Get race results for an event (public)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Race results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaceResult"
    post:
      operationId: submitResults
      tags: [results]
      summary: Submit race results for a moto
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultsInput"
      responses:
        "201":
          description: Results submitted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RaceResult"

  /events/{eventId}/results/publish:
    post:
      operationId: publishResults
      tags: [results]
      summary: Publish or unpublish event results
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishInput"
      responses:
        "200":
          description: Publication status updated

  # SERIES POINTS
  /series:
    get:
      operationId: listSeries
      tags: [series]
      summary: List all series
      responses:
        "200":
          description: Series list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Series"
    post:
      operationId: createSeries
      tags: [series]
      summary: Create a series
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeriesInput"
      responses:
        "201":
          description: Series created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"

  /series/{seriesId}:
    patch:
      operationId: updateSeries
      tags: [series]
      summary: Update a series (e.g. add/remove event IDs)
      parameters:
        - name: seriesId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeriesUpdateInput"
      responses:
        "200":
          description: Series updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"

  /series/{seriesId}/leaderboard:
    get:
      operationId: getSeriesLeaderboard
      tags: [series]
      summary: Get series leaderboard (public)
      parameters:
        - name: seriesId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Series leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesStanding"

  /series/{seriesId}/recalculate:
    post:
      operationId: recalculateSeriesPoints
      tags: [series]
      summary: Recalculate series points from results
      parameters:
        - name: seriesId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Points recalculated

  # DASHBOARD / WOW ENDPOINTS
  /dashboard/club/{clubId}:
    get:
      operationId: getClubDashboard
      tags: [dashboard]
      summary: Club dashboard summary — upcoming events, recent check-ins, total riders
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDashboard"

  /events/{eventId}/raceday-summary:
    get:
      operationId: getRaceDaySummary
      tags: [dashboard]
      summary: Race-day live summary — checked-in count, RFID linked, motos status
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Race day summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaceDaySummary"

  /public/states:
    get:
      operationId: listStates
      tags: [dashboard]
      summary: List all US states that have published events
      responses:
        "200":
          description: States with events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StateInfo"

  /public/upcoming:
    get:
      operationId: listUpcomingEvents
      tags: [dashboard]
      summary: List upcoming and active events (non-draft, non-completed) for the public home page
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingEventItem"

  /public/recent-results:
    get:
      operationId: listRecentResults
      tags: [dashboard]
      summary: Recent published race results across all events (public feed)
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentResultItem"

  /reports/event/{eventId}:
    get:
      operationId: getEventReport
      tags: [reports]
      summary: Generate event report (registration, checkin, results summary)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventReport"

  /stripe/connect/status:
    get:
      operationId: getStripeConnectStatus
      tags: [stripe]
      summary: Get Stripe Connect status for current club
      responses:
        "200":
          description: Stripe Connect status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectStatus"

  /stripe/connect/start:
    post:
      operationId: startStripeConnect
      tags: [stripe]
      summary: Create Stripe Connect account and return onboarding URL
      responses:
        "200":
          description: Onboarding URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectStartResult"

  /stripe/connect/dashboard-link:
    get:
      operationId: getStripeConnectDashboardLink
      tags: [stripe]
      summary: Get Stripe Express dashboard login link
      responses:
        "200":
          description: Dashboard link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectDashboardLink"

  /stripe/connect:
    delete:
      operationId: disconnectStripeConnect
      tags: [stripe]
      summary: Disconnect Stripe Connect account
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

