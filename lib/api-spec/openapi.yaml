    Moto:
      type: object
      required: [id, eventId, name, type, status]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [heat, lcq, main, practice, moto, enduro_test]
        raceClass:
          type: string
        raceClasses:
          type: array
          items:
            type: string
          description: For multi-class practice motos; when set overrides raceClass for display
          nullable: true
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        motoNumber:
          type: integer
        lapCount:
          type: ["integer", "null"]
          description: Number of laps in this moto
        timeLimitMs:
          type: ["integer", "null"]
          description: Time limit in milliseconds (practice sessions only, optional)
        plusLaps:
          type: ["integer", "null"]
          description: Extra laps after the time limit expires — 1 = one more lap after the flag (standard MX format), 0 = end immediately at the flag
        timeExpiredAt:
          type: ["string", "null"]
          format: date-time
          description: Set when the race timer expires and plusLaps > 0; null until then; server auto-completes the moto when the leader finishes their plus-laps
        practiceMode:
          type: ["string", "null"]
          enum: [lap_count, countdown, null]
          description: Timer mode for practice motos — lap_count (default) or countdown
        countdownSeconds:
          type: ["integer", "null"]
          description: Duration in seconds for countdown mode (practice motos only)
        scheduledTime:
          type: ["string", "null"]
        lineup:
          type: array
          items:
            $ref: "#/components/schemas/LineupEntry"
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        pausedAt:
          type: ["string", "null"]
          format: date-time
          description: Set when the moto is paused; null when running or completed
        totalPausedMs:
          type: integer
          description: Total accumulated paused duration in milliseconds across all pause/resume cycles
        staggeredOrder:
          type: ["integer", "null"]
          description: 1 = starts first, 2+ = subsequent start positions in a staggered group
        staggeredGroupId:
          type: ["integer", "null"]
          description: Shared group identifier for all motos in a staggered start group
        staggeredGroupMembers:
          type: array
          items:
            type: integer
          nullable: true
          description: Ordered list of moto IDs in the staggered group (sorted by staggeredOrder)
        enduroHasRfidStart:
          type: boolean
          description: Enduro tests only — true means RFID transponder at the start gate; false means organizer manually enters rider bib to start the clock

    MotoInput:
      type: object
      required: [name, type, raceClass, motoNumber]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [heat, lcq, main, practice, moto, enduro_test]
        raceClass:
          type: string
        raceClasses:
          type: array
          items:
            type: string
          description: For multi-class practice motos; when set overrides raceClass for display
        motoNumber:
