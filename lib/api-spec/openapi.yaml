components:
  schemas:
    NotificationAudienceCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PracticeSession:
      type: object
      required: [id, clubId, name, status, debounceMs, createdAt]
      properties:
        id:
          type: integer
        clubId:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [idle, active, ended]
        debounceMs:
          type: integer
        venueName:
          type: string
          nullable: true
          description: Track/venue name snapshotted from club settings at session creation time
        startedAt:
          type: string
          nullable: true
        endedAt:
          type: string
          nullable: true
        createdAt:
          type: string

    CreatePracticeSessionInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        debounceMs:
          type: integer

    UpdatePracticeSessionInput:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [idle, active, ended]
        debounceMs:
          type: integer

    DefaultRaceClass:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        details:
          type: string
          nullable: true

    ClubSettings:
      type: object
      required: [clubId, riderAcknowledgement, defaultClasses]
      properties:
        clubId:
          type: integer
        riderAcknowledgement:
          type: string
          nullable: true
        waiverPdfUrl:
          type: string
          nullable: true
        liabilityWaiverPdfUrl:
          type: string
          nullable: true
        liabilityWaiverFields:
          type: array
          nullable: true
          items:
            type: object
        defaultClasses:
          type: array
          items:
            $ref: "#/components/schemas/DefaultRaceClass"
        brandContingencies:
          type: array
          nullable: true
          items:
            type: string
        trackName:
          type: string
          nullable: true

    ClubSettingsInput:
      type: object
      properties:
        riderAcknowledgement:
          type: string
          nullable: true
        waiverPdfUrl:
          type: string
          nullable: true
        liabilityWaiverPdfUrl:
          type: string
          nullable: true
        liabilityWaiverFields:
          type: array
          nullable: true
          items:
            type: object
        defaultClasses:
          type: array
          items:
            $ref: "#/components/schemas/DefaultRaceClass"
        brandContingencies:
          type: array
          nullable: true
          items:
            type: string
        trackName:
          type: string
          nullable: true

    UpdateMe:
      type: object
      properties:
        name:
          type: string

    AdvanceToMainInput:
      type: object
      required: [raceClass]
      properties:
        raceClass:
          type: string
        topPerHeat:
          type: integer

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, role, tourCompleted, permissions]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, club_organizer, staff, public]
        clubId:
          type: ["integer", "null"]
        tourCompleted:
          type: boolean
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string

    PurchaseOption:
      type: object
