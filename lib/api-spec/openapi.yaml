openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RM Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clubs
    description: Club management
  - name: events
    description: Event management
  - name: riders
    description: Rider management
  - name: registrations
    description: Race registrations
  - name: checkins
    description: Race day check-in
  - name: rfid
    description: RFID transponder management
  - name: motos
    description: Race day moto and heat management
  - name: time-checks
    description: Enduro event-wide time checks (per-class expected arrival durations)
  - name: readers
    description: Club-registered RFID/MyLaps readers with unique ingest tokens
  - name: reader-assignments
    description: Per-event mapping of readers to checkpoint roles (start, finish, time check)
  - name: results
    description: Race results and lap times
  - name: series
    description: Series points and leaderboards
  - name: reports
    description: Reports and exports
  - name: dashboard
    description: Dashboard summary data
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: offline
    description: Offline mode package management
  - name: discounts
    description: Discount codes and categories
  - name: team
    description: Club team / employee management
  - name: anthropic
    description: Anthropic AI chat operations
  - name: practice
    description: Standalone open-practice timing sessions

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /offline/package-info:
    get:
      operationId: getOfflinePackageInfo
      tags: [offline]
      summary: Get offline package build metadata
      description: Returns the build timestamp and version of the current offline server package. Requires authentication.
      responses:
        "200":
          description: Package metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflinePackageInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Offline package not yet built
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /offline/package-rebuild:
    post:
      operationId: rebuildOfflinePackage
      tags: [offline]
      summary: Rebuild the offline server package
      description: Triggers a fresh build of the local server package. Requires authentication. Returns the new build metadata on success.
      responses:
        "200":
          description: Rebuild succeeded — returns new package metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflinePackageInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Rebuild failed or already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user's own profile (name)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMe"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /auth/request-setup:
    post:
      operationId: requestAccountSetup
      tags: [auth]
      summary: Send account setup or password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /auth/complete-setup:
    post:
      operationId: completeAccountSetup
      tags: [auth]
      summary: Activate account and set password using a setup token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSetupInput"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid or expired token

  /auth/complete-tour:
    post:
      operationId: completeTour
      tags: [auth]
      summary: Mark the first-login product tour as completed for the current user
      responses:
        "200":
          description: Tour marked complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated

  # TEAM (organizer-scoped employee management)
  /organizer/team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List staff employees for the caller's club
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create a staff employee and send invite email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberInput"
      responses:
        "201":
          description: Team member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /organizer/team/{userId}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member's name, email, or permissions; optionally resend invite
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamMemberInput"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Remove a team member from the club
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all organizer users (super_admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizerUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new organizer user (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizerUser"
        "409":
          description: Email already exists

  /users/{userId}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (super_admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /users/{userId}/resend-invite:
    post:
      operationId: resendUserInvite
      tags: [users]
      summary: Resend setup email to a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent

  # CLUBS
  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List all clubs
      responses:
        "200":
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      operationId: createClub
      tags: [clubs]
      summary: Create a club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubInput"
      responses:
        "201":
          description: Club created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"

  /clubs/{clubId}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    patch:
      operationId: updateClub
      tags: [clubs]
      summary: Update a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubUpdate"
      responses:
        "200":
          description: Club updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
    delete:
      operationId: deleteClub
      tags: [clubs]
      summary: Delete a club (super_admin only)
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Club deleted

  /clubs/{clubId}/settings:
    get:
      operationId: getClubSettings
      tags: [clubs]
      summary: Get club settings (rider acknowledgement, default classes)
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Club settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: putClubSettings
      tags: [clubs]
      summary: Upsert club settings (rider acknowledgement, default classes)
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubSettingsInput"
      responses:
        "200":
          description: Updated club settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # EVENTS
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (public, filterable by state/club/status)
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: clubId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a race event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted

  # READERS (club-registered physical readers)
  /readers:
    get:
      operationId: listReaders
      tags: [readers]
      summary: List all readers registered to the caller's club
      responses:
        "200":
          description: Readers ordered by name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reader"
    post:
      operationId: createReader
      tags: [readers]
      summary: Register a new reader for the club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReaderInput"
      responses:
        "201":
          description: The created reader (includes generated token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reader"

  /readers/connector-status:
    get:
      operationId: getConnectorStatus
      tags: [readers]
      summary: Live RM Connect app connections for the caller's club
      responses:
        "200":
          description: One entry per connected RM Connect app
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorStatus"

  /readers/recent-tags:
    get:
      operationId: getRecentTags
      tags: [readers]
      summary: Tags recently seen by this club's readers (live tag scanner)
      responses:
        "200":
          description: Recently seen tags, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentTag"
    delete:
      operationId: clearRecentTags
      tags: [readers]
      summary: Clear the live tag scanner list
      responses:
        "204":
          description: Cleared

  /readers/{readerId}:
    patch:
      operationId: updateReader
      tags: [readers]
      summary: Rename a registered reader
      parameters:
        - name: readerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReaderUpdateInput"
      responses:
        "200":
          description: The updated reader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reader"
    delete:
      operationId: deleteReader
      tags: [readers]
      summary: Remove a registered reader
      parameters:
        - name: readerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Reader deleted

  # RIDERS
  /riders:
    get:
      operationId: listRiders
      tags: [riders]
      summary: List riders
      parameters:
        - name: clubId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rider"
    post:
      operationId: createRider
      tags: [riders]
      summary: Create a rider record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderInput"
      responses:
        "201":
          description: Rider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/{riderId}:
    get:
      operationId: getRider
      tags: [riders]
      summary: Get rider details with history
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDetail"
    patch:
      operationId: updateRider
      tags: [riders]
      summary: Update rider
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderUpdate"
      responses:
        "200":
          description: Rider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  # RIDER DISCOUNT CODES
  /clubs/{clubId}/riders/{riderId}/discount-code:
    get:
      operationId: getRiderDiscountCode
      tags: [riders]
      summary: Get the current discount code assigned to a rider
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider discount code (or null if none assigned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDiscountCode"
        "401":
          description: Not authenticated
    post:
      operationId: generateRiderDiscountCode
      tags: [riders]
      summary: Generate a rider-specific discount code
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRiderDiscountCodeInput"
      responses:
        "201":
          description: Code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDiscountCode"
        "401":
          description: Not authenticated
        "409":
          description: Rider already has an active discount code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteRiderDiscountCode
      tags: [riders]
      summary: Delete/revoke the rider's current discount code
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: integer
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Not authenticated
        "404":
          description: No discount code found for this rider

  # REGISTRATIONS
  /events/{eventId}/registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List registrations for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registrations for event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register a rider for an event (public)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /rider/events/{eventId}/registrations/cancel:
    post:
      operationId: cancelMyRegistrations
      tags: [registrations]
      summary: Cancel one or more of the authenticated rider's registrations for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRegistrationsInput"
      responses:
        "200":
          description: Registrations cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: integer

  /events/{eventId}/cancellations:
    get:
      operationId: listEventCancellations
      tags: [registrations]
      summary: List rider-initiated cancellations for an event (organizer)
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancellations list
          content:
            application/json:
              schema:
                type: object
                required: [cancellations, unverifiedCount]
                properties:
                  unverifiedCount:
                    type: integer
                  cancellations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Cancellation"

  /events/{eventId}/cancellations/{registrationId}/verify:
    patch:
      operationId: verifyCancellationRefund
      tags: [registrations]
