    RiderMaintenanceHistoryEntry:
      type: object
      required: [id, riderId, itemKey, itemName, servicedAt, createdAt]
      properties:
        id:
          type: integer
        riderId:
          type: integer
        itemKey:
          type: string
        itemName:
          type: string
        servicedAt:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    NotificationLogEntry:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        audienceType:
          type: string
        eventId:
          type: integer
          nullable: true
        sentCount:
          type: integer
        sentAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - body
        - audienceType
        - sentCount
        - sentAt

    EnduroTimeCheckTarget:
      type: object
      required: [raceClass, durationMs]
      properties:
        raceClass:
          type: string
        durationMs:
          type: integer
          description: Expected duration (ms from the rider's start) for this class to reach the check

    EnduroTimeCheck:
      type: object
      required: [id, eventId, checkNumber, name, targets]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        checkNumber:
          type: integer
          description: 1-based order through the day
        name:
          type: string
        targets:
          type: array
          items:
            $ref: "#/components/schemas/EnduroTimeCheckTarget"
        createdAt:
          type: ["string", "null"]
          format: date-time

    EnduroTimeCheckInput:
      type: object
      required: [checkNumber, name, targets]
      properties:
        checkNumber:
          type: integer
        name:
          type: string
        targets:
          type: array
          items:
            $ref: "#/components/schemas/EnduroTimeCheckTarget"

    SetEnduroTimeChecksInput:
      type: object
      required: [timeChecks]
      properties:
        timeChecks:
          type: array
          items:
            $ref: "#/components/schemas/EnduroTimeCheckInput"
        penaltyConfig:
          oneOf:
            - $ref: "#/components/schemas/EnduroPenaltyConfig"
            - type: "null"

    RecordArrivalInput:
      type: object
      required: [riderId, arrivalTime]
      properties:
        riderId:
          type: integer
        arrivalTime:
          type: string
          format: date-time

    EnduroPenaltyConfig:
      type: object
      required: [earlySecPerMin, lateSecPerMin]
      properties:
        earlySecPerMin:
          type: number
          description: Seconds added to overall time per whole minute a rider arrives early
        lateSecPerMin:
          type: number
          description: Seconds added to overall time per whole minute a rider arrives late
        earlyDqMinutes:
          type: ["number", "null"]
          description: Disqualify rider if more than this many minutes early (null = disabled)
        lateDqMinutes:
          type: ["number", "null"]
          description: Disqualify rider if more than this many minutes late (null = disabled)
        timezone:
          type: ["string", "null"]
          description: IANA timezone identifier used when comparing RFID arrival times against expected times (e.g. "America/Denver"). Defaults to server local time if omitted.

    EnduroCheckpointArrival:
      type: object
      required: [id, eventId, timeCheckId, riderId, arrivalTime, recordedBy]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        timeCheckId:
          type: integer
        riderId:
          type: integer
        riderName:
          type: ["string", "null"]
        arrivalTime:
          type: string
          format: date-time
        recordedBy:
          type: string
          enum: [rfid, manual]
        createdAt:
          type: ["string", "null"]
          format: date-time

    EnduroPenaltySummaryEntry:
      type: object
      required: [riderId, riderName, raceClass, totalPenaltySeconds, disqualified]
      properties:
        riderId:
          type: integer
        riderName:
          type: string
        raceClass:
          type: ["string", "null"]
        totalPenaltySeconds:
          type: number
          description: Total extra seconds added to this rider's time across all checkpoints
        disqualified:
          type: boolean
          description: True if the rider exceeded any DQ threshold at any checkpoint
        checkDetails:
          type: array
          items:
            type: object
            required: [checkId, checkName, diffMinutes, penaltySeconds, disqualified]
            properties:
              checkId:
                type: integer
              checkName:
                type: string
              diffMinutes:
                type: number
                description: Positive = late, negative = early
              penaltySeconds:
                type: number
              disqualified:
                type: boolean
              hasArrival:
                type: boolean

    Reader:
      type: object
      required: [id, clubId, name, type, token, createdAt]
      properties:
        id:
          type: integer
        clubId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [rfid, mylaps]
        token:
          type: string
          description: UUID used as the URL key for this reader's ingest endpoint
        hardwareAddress:
          type: ["string", "null"]
          description: Last 6 of MAC address for Impinj R700, or IP address for MyLaps decoders. Used by RM Connect to connect to the hardware.
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ReaderInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [rfid, mylaps]
        hardwareAddress:
          type: string
          description: Last 6 of MAC address for Impinj R700, or IP address for MyLaps decoders

    ReaderUpdateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        hardwareAddress:
          type: ["string", "null"]
          description: Last 6 of MAC address for Impinj R700, or IP address for MyLaps decoders

    ConnectorStatus:
      type: object
      required: [readerId, readerName, readerType, connectedAt, hardware]
      properties:
        readerId:
          type: integer
        readerName:
          type: string
        readerType:
          type: string
        connectedAt:
          type: string
          format: date-time
        hardware:
          type: object
          required: [kind, connected, readCount]
          properties:
            kind:
              type: ["string", "null"]
              enum: [impinj, zebra, generic, mylaps, null]
            connected:
              type: boolean
            detail:
              type: ["string", "null"]
            lastReadAt:
              type: ["string", "null"]
              format: date-time
            readCount:
              type: integer

    RecentTag:
      type: object
      required: [rfidNumber, count, firstSeenAt, lastSeenAt]
      properties:
        rfidNumber:
          type: string
        count:
          type: integer
          description: Number of reads since first seen
        firstSeenAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        riderId:
          type: ["integer", "null"]
          description: Rider whose profile has this tag assigned, if any
        riderName:
          type: ["string", "null"]

    EventReaderAssignment:
      type: object
      required: [id, eventId, readerId, role]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        readerId:
          type: integer
        antennaId:
          type: ["integer", "null"]
          description: Specific antenna port (1-4), or null for any antenna on this reader
        role:
          type: string
          enum: [start, finish, time_check]
        motoId:
          type: ["integer", "null"]
          description: For start/finish roles — the specific test moto this reader covers
        timeCheckId:
          type: ["integer", "null"]
          description: For time_check role — the enduro_time_check this reader is positioned at
        createdAt:
          type: string
          format: date-time

    EventReaderAssignmentInput:
      type: object
      required: [readerId, role]
      properties:
        readerId:
          type: integer
        antennaId:
          type: integer
          nullable: true
        role:
          type: string
          enum: [start, finish, time_check]
        motoId:
          type: integer
          nullable: true
        timeCheckId:
          type: integer
          nullable: true

    SetEventReaderAssignmentsInput:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/EventReaderAssignmentInput"

    ReaderCrossingInput:
      type: object
      properties:
        rfidNumber:
          type: string
          description: RFID tag EPC or MyLaps transponder number
        crossingTime:
          type: string
          format: date-time
          description: ISO timestamp of the crossing; defaults to server time if omitted
        antennaId:
          type: integer
          description: Antenna port number (used to disambiguate multi-antenna readers)
        eventId:
          type: integer
          description: Optional — if omitted the server resolves the active race_day event for this reader's club
