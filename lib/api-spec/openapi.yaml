              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UpdateMe:
      type: object
      properties:
        name:
          type: string

    AdvanceToMainInput:
      type: object
      required: [raceClass]
      properties:
        raceClass:
          type: string
        topPerHeat:
          type: integer

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, role, tourCompleted]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, club_organizer, staff, public]
        clubId:
          type: ["integer", "null"]
        tourCompleted:
          type: boolean
        createdAt:
          type: string

    PurchaseOption:
      type: object
      required: [id, name, amount]
      properties:
        id:
          type: string
        name:
          type: string
        amount:
          type: number
        categoryId:
          type: ["integer", "null"]
          description: ID of the discount category this purchase option belongs to

    Club:
      type: object
      required: [id, name, state]
      properties:
        id:
          type: integer
        name:
          type: string
        state:
          type: string
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    ClubInput:
      type: object
      required: [name, state]
      properties:
        name:
          type: string
        state:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        logoUrl:
          type: string
        website:
          type: string
        description:
          type: string

    ClubUpdate:
      type: object
      properties:
        name:
          type: string
        state:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        logoUrl:
          type: string
        website:
          type: string
        description:
          type: string

    Event:
      type: object
      required: [id, clubId, name, date, state, status]
      properties:
        id:
          type: integer
        clubId:
          type: integer
        name:
          type: string
        date:
          type: string
        state:
          type: string
        location:
          type: ["string", "null"]
        trackName:
          type: ["string", "null"]
        raceClasses:
          type: array
          items:
            type: string
        raceClassLimits:
          type: object
          additionalProperties:
            type: ["integer", "null"]
        registrationOpen:
          type: ["string", "null"]
        registrationClose:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, registration_open, registration_closed, race_day, results_published, completed]
        paymentEnabled:
          type: boolean
        requireAma:
          type: boolean
        entryFee:
          type: ["number", "null"]
        maxRiders:
          type: ["integer", "null"]
        clubName:
          type: ["string", "null"]
        clubLogoUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        timingTechnology:
          type: string
          enum: [rfid, mylaps]
          default: rfid
        transponderRentalEnabled:
          type: boolean
        transponderRentalFee:
          type: ["number", "null"]
        noDuplicateBibs:
          type: boolean
        requireClubId:
          type: boolean
        scoringTableId:
          type: ["integer", "null"]
        entryFeeCategoryId:
          type: ["integer", "null"]
          description: Discount category ID assigned to the base entry fee
        purchaseOptions:
          type: array
