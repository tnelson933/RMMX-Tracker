appId: com.rockymtn.rm-tracker
productName: RM Tracker
copyright: Copyright © 2026 RM Tracker

directories:
  output: release
  buildResources: assets

afterPack: ./scripts/after-pack.js

files:
  - dist/**/*
  - package.json
  # node_modules is intentionally included — electron-builder runs afterPack
  # to rebuild native modules (serialport, better-sqlite3) for Electron's
  # Node.js ABI.  Excluding node_modules here would strip those runtime deps
  # and crash the packaged app on launch.
  - node_modules/**/*

extraResources:
  - from: ../local-server/package.json
    to: local-server/package.json
  - from: ../local-server/dist
    to: local-server/dist
    filter:
      - "**/*.mjs"
      - "**/*.mjs.map"
  - from: ../local-server/node_modules
    to: local-server/node_modules
    filter:
      - "**/*"
      - "!**/*.md"
      - "!**/test/**"
      - "!**/tests/**"
      - "!**/__tests__/**"
  - from: ../race-platform/dist/public
    to: race-platform
    filter:
      - "**/*"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.sports
  darkModeSupport: true

win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: RM Tracker

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Sports

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "RM-Tracker-Setup.${ext}"

dmg:
  artifactName: "RM-Tracker-${arch}.${ext}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
