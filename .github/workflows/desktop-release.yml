name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS installer
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Remove Replit platform-exclusion overrides
        run: |
          sed -i '' '/": "-"/d' pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build local-server
        run: pnpm --filter @workspace/local-server run build

      - name: Build race-platform frontend
        run: pnpm --filter @workspace/race-platform run build
        env:
          PORT: "9090"
          BASE_PATH: "/"

      - name: Build Electron main + preload
        run: pnpm --filter @workspace/desktop run build

      - name: Install Python setuptools (required by node-gyp on macOS)
        run: pip3 install setuptools --break-system-packages

      - name: Package macOS installer
        run: pnpm --filter @workspace/desktop exec electron-builder --mac --x64 --arm64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: artifacts/desktop/release/*.dmg

  build-windows:
    name: Build Windows installer
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Remove Replit platform-exclusion overrides
        shell: pwsh
        run: |
          (Get-Content pnpm-workspace.yaml) | Where-Object { $_ -notmatch '": "-"' } | Set-Content pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build local-server
        run: pnpm --filter @workspace/local-server run build

      - name: Build race-platform frontend
        run: pnpm --filter @workspace/race-platform run build
        env:
          PORT: "9090"
          BASE_PATH: "/"

      - name: Build Electron main + preload
        run: pnpm --filter @workspace/desktop run build

      - name: Package Windows installer
        run: pnpm --filter @workspace/desktop exec electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: artifacts/desktop/release/*.exe

  publish-release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Create release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          name: "Desktop App ${{ github.ref_name }}"
          files: dist/*
          fail_on_unmatched_files: true
